apiVersion: v1
kind: Service
metadata:
  # Ensure we accept RFC 1035 Label Names, see https://github.com/kata-containers/kata-containers/pull/11314
  name: prometheus-service
  namespace: "@@REPLACE_NAMESPACE@@"
spec:
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
