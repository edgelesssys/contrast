apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset
  namespace: "@@REPLACE_NAMESPACE@@"
spec:
  selector:
    matchLabels:
      app: foo
  serviceName: "foo"
  template:
    metadata:
      labels:
        app: foo
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: apache-httpd-fedora
          image: quay.io/fedora/httpd-24-micro@sha256:f8f7d90feb8beace46a9f235e1a215042c7a5d04e1567e11173f7b73ab621a1d
          ports:
            - containerPort: 8443
            - containerPort: 8080
  volumeClaimTemplates:
    - metadata:
        name: foo
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "foo-storageclass"
        resources:
          requests:
            storage: 100Mi
