apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-mount
  namespace: "@@REPLACE_NAMESPACE@@"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secure-mount
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secure-mount
    spec:
      containers:
        - name: secure-mount
          image: quay.io/quay/busybox@sha256:92f3298bf80a1ba949140d77987f5de081f010337880cd771f7e7fc928f8c74d
          command:
            - /bin/sh
            - -ec
            - |
              sleep 15
              grep " /run/kata-containers/image ext4 " /host/proc/1/mounts || {
                echo "❌ trusted-store not found" >&2
                exit 1
              }
              echo "✅ trusted-store exists"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
          resources:
            requests:
              memory: 100Mi
            limits:
              memory: 100Mi
      volumes:
        - name: host-proc
          hostPath:
            path: /proc

      runtimeClassName: contrast-cc
