name: e2e test nightly

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      GITHUB_TOKEN_IN:
        required: true
      CACHIX_AUTH_TOKEN:
        required: true
      NUNKI_CI_COMMIT_PUSH_PR:
        required: true
      TEAMS_CI_WEBHOOK:
        required: true
      CONTRAST_GHCR_READ:
        required: true
  schedule:
    - cron: "30 23 * * *" # 23:30 UTC, every day

jobs:
  maintenance:
    name: maintenance
    uses: ./.github/workflows/bm_maintenance.yml
    secrets:
      GITHUB_TOKEN_IN: ${{ secrets.GITHUB_TOKEN_IN || secrets.GITHUB_TOKEN }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      TEAMS_CI_WEBHOOK: ${{ secrets.TEAMS_CI_WEBHOOK }}
    permissions:
      contents: read
      packages: write

  test_matrix:
    needs: "maintenance"
    strategy:
      matrix:
        debug-shell: [true, false]
        platform:
          - name: Metal-QEMU-SNP
            runner: SNP
            self-hosted: true
          - name: Metal-QEMU-TDX
            runner: TDX
            self-hosted: true
          - name: Metal-QEMU-SNP-GPU
            runner: SNP-GPU
            self-hosted: true
          - name: Metal-QEMU-TDX-GPU
            runner: TDX-GPU
            self-hosted: true
        test-name:
          # keep-sorted start
          - atls
          - attestation
          - badaml-sandbox
          - badaml-vuln
          - containerd-11644-reproducer
          - coordinator
          - genpolicy-unsupported
          - gpu
          - imagepuller-auth
          - imagestore
          - kds-pcs-downtime
          - memdump
          - multi-runtime-class
          - openssl
          - peerrecovery
          - policy
          - proxy
          - regression
          - servicemesh
          - vault
          - volumestatefulset
          - workloadsecret
          # keep-sorted end
        set: [""]
        exclude:
          - platform:
              name: Metal-QEMU-SNP
            test-name: gpu
          - platform:
              name: Metal-QEMU-TDX
            test-name: gpu
          - debug-shell: false
            test-name: badaml-vuln
          - debug-shell: false
            test-name: badaml-sandbox
        include:
          # Exercise the debug set on every platform with the cheapest
          # per-platform test, to catch regressions in the debug overlay
          # that the base-set matrix cannot surface.
          - set: debug
            debug-shell: false
            test-name: openssl
            platform:
              name: Metal-QEMU-SNP
              runner: SNP
              self-hosted: true
          - set: debug
            debug-shell: false
            test-name: gpu
            platform:
              name: Metal-QEMU-SNP-GPU
              runner: SNP-GPU
              self-hosted: true
          - set: debug
            debug-shell: false
            test-name: openssl
            platform:
              name: Metal-QEMU-TDX
              runner: TDX
              self-hosted: true
          - set: debug
            debug-shell: false
            test-name: gpu
            platform:
              name: Metal-QEMU-TDX-GPU
              runner: TDX-GPU
              self-hosted: true
      fail-fast: false
    name: "${{ matrix.platform.name }}"
    uses: ./.github/workflows/e2e.yml
    with:
      skip-undeploy: false
      test-name: ${{ matrix.test-name }}
      platform: ${{ matrix.platform.name }}
      runner: ${{ matrix.platform.runner }}
      self-hosted: ${{ matrix.platform.self-hosted }}
      debug-shell: ${{ matrix.debug-shell }}
      set: ${{ matrix.set }}
    secrets:
      GITHUB_TOKEN_IN: ${{ secrets.GITHUB_TOKEN_IN || secrets.GITHUB_TOKEN }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      NUNKI_CI_COMMIT_PUSH_PR: ${{ secrets.NUNKI_CI_COMMIT_PUSH_PR }}
      TEAMS_CI_WEBHOOK: ${{ secrets.TEAMS_CI_WEBHOOK }}
      CONTRAST_GHCR_READ: ${{ secrets.CONTRAST_GHCR_READ }}
    permissions:
      contents: read
      packages: write
