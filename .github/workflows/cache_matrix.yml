name: cache matrix

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  linux:
    concurrency:
      group: cache-matrix-x86_64-linux
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup_nix
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          cachixToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build base matrix and SBOMs
        run: |
          attrs=(
            ".#legacyPackages.x86_64-linux.base.matrix"
            ".#legacyPackages.x86_64-linux.base.sbom.cli"
            ".#legacyPackages.x86_64-linux.base.sbom.runtimeConfidential"
            ".#legacyPackages.x86_64-linux.base.sbom.runtimeNonConfidential"
          )
          if nix build --dry-run "${attrs[@]}" 2>&1 | grep -q "will be built"; then
            nix build --no-link --keep-going "${attrs[@]}"
          else
            echo "Nothing to build. Cache already up to date."
          fi

  vuln-scan:
    needs: linux
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/vuln_scan.yml
    secrets:
      GITHUB_TOKEN_IN: ${{ secrets.GITHUB_TOKEN }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

  darwin:
    # Runs after the linux job so the x86_64-linux runtime closure can be substituted here.
    needs: linux
    concurrency:
      group: cache-matrix-aarch64-darwin
      cancel-in-progress: true
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup_nix
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          cachixToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build base matrix
        run: |
          attr=".#legacyPackages.aarch64-darwin.base.matrix"
          if nix build --dry-run "$attr" 2>&1 | grep -q "will be built"; then
            nix build --no-link --keep-going "$attr"
          else
            echo "Nothing to build. Cache already up to date."
          fi
