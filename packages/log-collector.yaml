apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
spec:
  selector:
    matchLabels:
      name: log-collector
  template:
    metadata:
      labels:
        name: log-collector
    spec:
      priorityClassName: high-priority-logcollector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: log-collector
          image: "ghcr.io/edgelesssys/contrast/k8s-log-collector:0.1.0@sha256:1382e46a5dca826d8fbeb3fd6d11e012f485ba84f595060910735f296903afcf"
          volumeMounts:
            - mountPath: /logs
              name: log-volume
              readOnly: true
            - mountPath: /journal
              name: journal-volume
              readOnly: true
            - mountPath: /run/containerd
              name: containerd-run
              readOnly: true
            - mountPath: /run/k3s/containerd
              name: k3s-containerd-run
              readOnly: true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: log-volume
          # mount the nodes logs to the container
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: journal-volume
          # mount the systemd journal for host-level log collection
          hostPath:
            path: /var/log/journal
            type: DirectoryOrCreate
        - name: containerd-run
          hostPath:
            path: /run/containerd
            type: DirectoryOrCreate
        - name: k3s-containerd-run
          hostPath:
            path: /run/k3s/containerd
            type: DirectoryOrCreate
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority-logcollector
value: 10000000
globalDefault: false
description: "This priority class is used to prioritize the log collector pod creation before anything else"
