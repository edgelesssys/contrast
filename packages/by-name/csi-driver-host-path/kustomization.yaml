apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: csi-system

resources:
  - namespace.yaml
  # keep-sorted start
  - csi-attacher-rbac.yaml
  - csi-health-rbac.yaml
  - csi-hostpath-driverinfo.yaml
  - csi-hostpath-plugin.yaml
  - csi-provisioner-rbac.yaml
  - csi-resizer-rbac.yaml
  - csi-snapshotter-rbac.yaml
  - csi-storageclass.yaml
  # keep-sorted end

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: hostpath.csi.k8s.io
      app.kubernetes.io/part-of: csi-driver-host-path

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/nodeSelector
        value: {"ci.contrast.edgeless.systems/main-runner": "true"}
    target:
      kind: StatefulSet
  - patch: |-
      - op: add
        path: /metadata/labels
        value: {"ci.contrast.edgeless.systems/is-default-class": "true"}
      - op: remove
        path: /metadata/annotations/storageclass.kubernetes.io~1is-default-class
    target:
      kind: StorageClass
