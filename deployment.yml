---
apiVersion: v1
kind: Namespace
metadata:
  name: openssl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openssl-backend
  namespace: openssl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openssl-backend
  template:
    metadata:
      annotations:
        io.katacontainers.config.agent.policy: 
      labels:
        app.kubernetes.io/name: openssl-backend
    spec:
      containers:
        - command:
            - /bin/bash
            - "-c"
            - openssl s_server -port 443 -Verify 2 -CAfile /tls-config/mesh-ca.pem -cert /tls-config/certChain.pem -key /tls-config/key.pem
          image: "ghcr.io/freax13/contrast/openssl@sha256:bdd94fc888372bd8582cf22e7ffbe112f555d87e5c757b8f20d1738c539c414f"
          name: openssl-backend
          ports:
            - containerPort: 443
              name: https
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            tcpSocket:
              port: 443
          resources:
            limits:
              memory: 50Mi
            requests:
              memory: 50Mi
          volumeMounts:
            - mountPath: /tls-config
              name: contrast-tls-certs
      initContainers:
        - env:
            - name: COORDINATOR_HOST
              value: coordinator
          image: "ghcr.io/freax13/contrast/initializer@sha256:d80bd3272b78fcdd3bb131a21372ea271add947a4aa0d88f9552448fd1758ed9"
          name: contrast-initializer
          resources:
            requests:
              memory: 50Mi
          volumeMounts:
            - mountPath: /tls-config
              name: contrast-tls-certs
      runtimeClassName: contrast-cc-81ebecbf2bde082dedd98b337fbbd386
      volumes:
        - emptyDir: {}
          name: contrast-tls-certs
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/name: port-forwarder-openssl-backend
  name: port-forwarder-openssl-backend
  namespace: openssl
spec:
  containers:
    - command:
        - /bin/bash
        - "-c"
        - "echo Starting port-forward with socat; exec socat -d -d TCP-LISTEN:${LISTEN_PORT},fork TCP:${FORWARD_HOST}:${FORWARD_PORT}"
      env:
        - name: LISTEN_PORT
          value: "443"
        - name: FORWARD_HOST
          value: openssl-backend
        - name: FORWARD_PORT
          value: "443"
      image: "ghcr.io/freax13/contrast/port-forwarder@sha256:c722e7c2d4de8e1dd855d2cb278edce2f22507f51d3d120434ab52f1c17a7a6c"
      name: port-forwarder
      ports:
        - containerPort: 443
      resources:
        limits:
          memory: 50Mi
        requests:
          memory: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openssl-backend
  namespace: openssl
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
  selector:
    app.kubernetes.io/name: openssl-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openssl-frontend
  namespace: openssl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openssl-frontend
  template:
    metadata:
      annotations:
        io.katacontainers.config.agent.policy: 
      labels:
        app.kubernetes.io/name: openssl-frontend
    spec:
      containers:
        - command:
            - /bin/bash
            - "-c"
            - openssl s_server -www -port 443 -cert /tls-config/certChain.pem -key /tls-config/key.pem -cert_chain /tls-config/certChain.pem
          image: "ghcr.io/freax13/contrast/openssl@sha256:bdd94fc888372bd8582cf22e7ffbe112f555d87e5c757b8f20d1738c539c414f"
          name: openssl-frontend
          ports:
            - containerPort: 443
              name: https
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            tcpSocket:
              port: 443
          resources:
            limits:
              memory: 50Mi
            requests:
              memory: 50Mi
          volumeMounts:
            - mountPath: /tls-config
              name: contrast-tls-certs
      initContainers:
        - env:
            - name: COORDINATOR_HOST
              value: coordinator
          image: "ghcr.io/freax13/contrast/initializer@sha256:d80bd3272b78fcdd3bb131a21372ea271add947a4aa0d88f9552448fd1758ed9"
          name: contrast-initializer
          resources:
            requests:
              memory: 50Mi
          volumeMounts:
            - mountPath: /tls-config
              name: contrast-tls-certs
      runtimeClassName: contrast-cc-81ebecbf2bde082dedd98b337fbbd386
      volumes:
        - emptyDir: {}
          name: contrast-tls-certs
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/name: port-forwarder-openssl-frontend
  name: port-forwarder-openssl-frontend
  namespace: openssl
spec:
  containers:
    - command:
        - /bin/bash
        - "-c"
        - "echo Starting port-forward with socat; exec socat -d -d TCP-LISTEN:${LISTEN_PORT},fork TCP:${FORWARD_HOST}:${FORWARD_PORT}"
      env:
        - name: LISTEN_PORT
          value: "443"
        - name: FORWARD_HOST
          value: openssl-frontend
        - name: FORWARD_PORT
          value: "443"
      image: "ghcr.io/freax13/contrast/port-forwarder@sha256:c722e7c2d4de8e1dd855d2cb278edce2f22507f51d3d120434ab52f1c17a7a6c"
      name: port-forwarder
      ports:
        - containerPort: 443
      resources:
        limits:
          memory: 50Mi
        requests:
          memory: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openssl-frontend
  namespace: openssl
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
  selector:
    app.kubernetes.io/name: openssl-frontend
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: coordinator
  namespace: openssl
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coordinator
  serviceName: coordinator
  template:
    metadata:
      annotations:
        contrast.edgeless.systems/pod-role: coordinator
        io.katacontainers.config.agent.policy: 
      labels:
        app.kubernetes.io/name: coordinator
    spec:
      containers:
        - image: "ghcr.io/freax13/contrast/coordinator@sha256:9fe2a780da0402b6e6136a016180509e50bd0993ffa9a3cd640986e83e0bc5f4"
          name: coordinator
          ports:
            - containerPort: 1313
              name: userapi
            - containerPort: 7777
              name: meshapi
          readinessProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            tcpSocket:
              port: 1313
          resources:
            limits:
              memory: 100Mi
            requests:
              memory: 100Mi
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          volumeDevices:
            - devicePath: /dev/csi0
              name: state-device
      runtimeClassName: contrast-cc-81ebecbf2bde082dedd98b337fbbd386
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: state-device
        namespace: ""
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn-test
        volumeMode: Block
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/name: port-forwarder-coordinator
  name: port-forwarder-coordinator
  namespace: openssl
spec:
  containers:
    - command:
        - /bin/bash
        - "-c"
        - "echo Starting port-forward with socat; exec socat -d -d TCP-LISTEN:${LISTEN_PORT},fork TCP:${FORWARD_HOST}:${FORWARD_PORT}"
      env:
        - name: LISTEN_PORT
          value: "1313"
        - name: FORWARD_HOST
          value: coordinator
        - name: FORWARD_PORT
          value: "1313"
      image: "ghcr.io/freax13/contrast/port-forwarder@sha256:c722e7c2d4de8e1dd855d2cb278edce2f22507f51d3d120434ab52f1c17a7a6c"
      name: port-forwarder
      ports:
        - containerPort: 1313
      resources:
        limits:
          memory: 50Mi
        requests:
          memory: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    contrast.edgeless.systems/expose-service: "true"
  name: coordinator
  namespace: openssl
spec:
  ports:
    - name: userapi
      port: 1313
      targetPort: 1313
    - name: meshapi
      port: 7777
      targetPort: 7777
  selector:
    app.kubernetes.io/name: coordinator
