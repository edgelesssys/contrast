---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snp-report-debug
  namespace: openssl-p
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snp-report-debug
  template:
    metadata:
      annotations:
        io.katacontainers.config.agent.policy: 
      labels:
        app: snp-report-debug
    spec:
      containers:
        - image: "ghcr.io/katexochen/contrast/snp-issuer:v0.0.1@sha256:bb48d90297a6ba691b6c78d57dbd15406e04add51b71c7e29ecc74451ded5d4e"
          name: snp-issuer
        - image: "ghcr.io/katexochen/contrast/dmesg@sha256:1811b0848dd0e59976913a6c3946a0be45e84728c30c7d617e1522bd162f282d"
          name: dmesg
          securityContext:
            privileged: true
      runtimeClassName: kata-cc-isolation
